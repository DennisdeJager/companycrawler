services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: companycrawler
      POSTGRES_PASSWORD: companycrawler
      POSTGRES_DB: companycrawler
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U companycrawler"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "app.worker.run"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/storage:/app/storage

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  db-data:

